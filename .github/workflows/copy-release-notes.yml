name: Copy release notes to midnight-docs

on:
  workflow_dispatch:
    inputs:
      toolchain_version:
        description: 'Toolchain version (e.g. v1.2.3)'
        required: true
        type: string
      language_version:
        description: 'Language version (e.g. v1.2.3)'
        required: true
        type: string
      branch:
        description: 'Branch to grab release notes from'
        required: true
        type: choice
        default: 'release/midnight'
        options:
          - main
          - release/midnight
      release_notes_branch:
        description: 'Branch to merge with in midnight-docs'
        required: true
        type: string
        default: 'main'
      release_notes_pr_description:
        description: 'PR description for release notes'
        required: true
        type: string
        default: 'Compact toolchain release notes copied to midnight-docs'

permissions: {}

jobs:
  setup:
    name: Setup the variable
    runs-on: ubuntu-latest
    outputs:
      release_notes_file: ${{ steps.release_notes.outputs.file }}
    steps:
      - name: Check format of compiler and language versions
        run: |
          TOOLCHAIN="${{ inputs.toolchain_version }}"
          LANGUAGE="${{ inputs.language_version }}"

          if [[ ! "$TOOLCHAIN" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::toolchain version must match v*.*.* format (e.g. v1.2.3), got: $TOOLCHAIN"
            exit 1
          fi

          if [[ ! "$LANGUAGE" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::language_version must match v*.*.* format (e.g. v1.2.3), got: $LANGUAGE"
            exit 1
          fi

          echo "Toolchain version format is valid: $TOOLCHAIN"
          echo "Language version format is valid: $LANGUAGE"

      - name: Compute release notes path
        id: release_notes
        run: |
          TOOLCHAIN="${{ inputs.toolchain_version }}"
          # Strip leading 'v' if present
          CLEAN_VERSION="${TOOLCHAIN#v}"
          echo "file=doc/release-notes/toolchain-${CLEAN_VERSION}.md" >> "$GITHUB_OUTPUT"

  copy-release-notes:
    name: Create branch in midnight-docs
    needs: [ setup ]
    uses: ./.github/workflows/compute-release-notes.yml
    secrets: inherit #if inherit does not work we need to uncomment below
    with:
      release_notes_file: ${{ needs.setup.outputs.release_notes_file }}
      branch: ${{ inputs.branch }}
      toolchain_version: ${{ inputs.toolchain_version }}
      language_version: ${{ inputs.language_version }}
      release_notes_branch: ${{ inputs.release_notes_branch }}
      release_notes_pr_description: ${{ inputs.release_notes_pr_description }}
