name: Build workflow for release

on:
  workflow_call:
    inputs:
      tag:
        description: 'Release tag'
        required: true
        type: string
      branch:
        description: 'Release branch'
        required: true
        type: string
      platform:
        description: 'Image with OS to run on'
        required: true
        type: string
      architecture:
        description: 'Processor architecture'
        required: true
        type: string
      artifact:
        description: 'Build artifact'
        required: true
        type: string
      buildCommand:
        description: 'Command to build artifact'
        required: true
        type: string
      skipCache:
        description: 'Skip nix cache'
        required: true
        type: boolean
      include_release_notes:
        description: 'Include release notes in zipped files'
        required: true
        type: boolean
        default: true
      release_notes_file:
        description: 'Path to release notes file'
        required: false
        type: string
        default: ''

permissions: {}

jobs:
  build:
    name: Build compactc binary for specific system
    runs-on: ${{ inputs.platform }}
    permissions:
      contents: read
    steps:
      - name: Set name of artifact
        run: |
          export ARTIFACT_NAME=compactc_${{ inputs.tag }}_${{ inputs.architecture }}
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> $GITHUB_ENV

      - name: Checkout compactc repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.branch }}

      - name: Setup Nix with cache
        uses: ./.github/actions/setup-nix-cache
        with:
          skip_cache: ${{ inputs.skipCache }}
          attic_token: ${{ secrets.ATTIC_CACHE_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          always-auth: true
          registry-url: https://npm.pkg.github.com/
          scope: '@midnight-ntwrk'
          node-version-file: '.nvmrc'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Create binary for specific system
        run: |
          ${{ inputs.buildCommand }}
          if [ "${{ inputs.include_release_notes }}" = "true" ] && [ -n "${{ inputs.release_notes_file }}" ]; then
            if [ -f "${{ inputs.release_notes_file }}" ]; then
              zip --junk-paths ${{ env.ARTIFACT_NAME }}.zip result/**/** "${{ inputs.release_notes_file }}"
            else
              echo "::error::Release notes file not found: ${{ inputs.release_notes_file }}"
              exit 1
            fi
          else
            zip --junk-paths ${{ env.ARTIFACT_NAME }}.zip result/**/**
          fi

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.artifact }}
          path: ${{ env.ARTIFACT_NAME }}.zip
          if-no-files-found: error
