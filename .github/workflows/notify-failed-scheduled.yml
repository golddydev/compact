name: Notify on scheduled CI failure

on:
  workflow_run:
    # NB: these workflows use the name values of workflows and not filenames
    # changing their names must also be reflected here
    workflows:
      - Compiler Build
      - Check docs are in sync with midnight-docs
      - CodeQL
      - Compiler fuzzer
      - Internal release of compact toolchain
      - Scan
    types:
      - completed

permissions: {}

jobs:
  create-issue:
    name: Create issue for scheduled CI failure
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'schedule'
    permissions:
      issues: write
      actions: read
    steps:
      - name: Download failed contracts
        id: contracts
        if: github.event.workflow_run.name == 'Compiler fuzzer'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          name: failed-contracts
          path: failed-contracts
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read failed contracts
        id: read-contracts
        if: steps.contracts.outcome == 'success'
        run: |
          content=""
          for f in failed-contracts/*; do
            name=$(basename "$f")
            body=$(cat "$f")
            content="${content}<details><summary>${name}</summary>

          \`\`\`
          ${body}
          \`\`\`

          </details>

          "
          done
          # Write to file to avoid escaping issues
          echo "$content" > /tmp/contract-section.md

      - name: Create or update issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const workflowName = context.payload.workflow_run.name;
            const runUrl = context.payload.workflow_run.html_url;
            const runId = context.payload.workflow_run.id;
            const branch = context.payload.workflow_run.head_branch;
            const date = new Date().toISOString().split('T')[0];

            let contractSection = '';
            try {
              contractSection = '\n\n### Failed contracts\n\n' + fs.readFileSync('/tmp/contract-section.md', 'utf8');
            } catch {
              // No failed contracts artifact available
            }

            const title = `Scheduled CI failure: ${workflowName}`;
            const label = 'ci-failure';

            // Ensure the label exists
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
              });
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: 'd73a4a',
                description: 'Automated issue for scheduled CI failures',
              });
            }

            // Check for an existing open issue for this workflow
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
            });

            const existing = existingIssues.find(i => i.title === title);

            if (existing) {
              // Add a comment to the existing issue instead of opening a duplicate
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Still failing as of ${date}.\n\n- **Run:** ${runUrl}\n- **Branch:** \`${branch}\`${contractSection}`,
              });
              core.info(`Commented on existing issue #${existing.number}`);
            } else {
              // Create a new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                labels: [label],
                body: [
                  `The scheduled run of **${workflowName}** failed.`,
                  '',
                  `- **Run:** ${runUrl}`,
                  `- **Branch:** \`${branch}\``,
                  `- **Date:** ${date}`,
                  '',
                  'This issue was created automatically and will receive comments on subsequent failures.',
                  'Close it once the problem is resolved.',
                ].join('\n') + contractSection,
              });
              core.info('Created new issue');
            }
