version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7

  - package-ecosystem: "npm"
    directories:
      - "/runtime"
      - "/editor-support/vsc/compact"
      - "/tests-e2e"
      - "/test-center"
      - "/test-src-maps"
      - "/debug-test"
      - "/nix/dry-install"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7

